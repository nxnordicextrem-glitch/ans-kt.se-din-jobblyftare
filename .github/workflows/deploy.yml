name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: https://oxibxbxhrlqujlcyjgew.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94aWJ4YnhocmxxdWpsY3lqZ2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjI3NzcsImV4cCI6MjA5MjU5ODc3N30.Ve2zrz8ku2zUXIuPTPUg9fpXRx299S19TA9RM01nyhs
          VITE_SUPABASE_PROJECT_ID: oxibxbxhrlqujlcyjgew
        run: npm run build

      - name: Ensure CNAME in dist
        run: |
          if [ -f CNAME ]; then cp CNAME dist/CNAME; fi

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
